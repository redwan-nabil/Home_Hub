name: AI Portfolio Architect
on:
  push:
    paths:
      - 'incoming/**'
jobs:
  build_portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install openai
      - name: Run AI Architect
        env:
          # This token is built into GitHub automatically. No setup required!
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/ai_architect.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 AI Automated Portfolio Build (GitHub Native AI)"
